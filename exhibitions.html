           <!-- ============================================================

<script>

  },
  {

  },
  {

  },

  },
  {
    title: "Art & Roots in the Woods",
    venue: "Meetshovenbos — Aarschot, Belgium",
    datesDisplay: "7 September 2025",
    year: "2025",
    startDate: "2025-09-07",
    endDate: "2025-09-07"
  },
  {
    title: "Publiction",

  },

    endDate: "2024-12-11"
  },
  {

    datesDisplay: "November 26, 2024 – January 7, 2025",
    year: "2024",
    startDate: "2024-11-26",
    endDate: "2025-01-07"
  }


];

// 2. De HTML-blauwdruk voor jouw lijstitems (met het oranje ongoing-vakje)
function createExhibitionHTML(exhibition, isOngoing = false) {
  // Als de expo NU bezig is, tonen we het oranje vakje. Anders blijft dit leeg.
  const ongoingBadge = isOngoing ? '<span class="ongoing-badge" style="background-color: orange; color: white; padding: 3px 8px; font-size: 0.75rem; border-radius: 3px; margin-left: 10px; display: inline-block; vertical-align: middle; font-weight: normal;">Ongoing</span>' : '';

  return `
    <li class="exhibition-item">
      <span class="exhibition-year">${exhibition.year}</span>
      <div>
        <h2 class="exhibition-title">
          ${exhibition.title} 
          ${ongoingBadge}
        </h2>
        <p class="exhibition-venue">${exhibition.venue}</p>
        <p class="exhibition-dates">${exhibition.datesDisplay}</p>
      </div>
    </li>
  `;
}

// 3. De driedelige sorteermachine met automatische 'filler'-teksten
function renderExhibitions() {
  const upcomingList = document.getElementById('upcoming-exhibitions-list');
  const ongoingList = document.getElementById('ongoing-exhibitions-list');
  const pastList = document.getElementById('past-exhibitions-list');
  
  // Vandaag ophalen en klok op middernacht zetten
  const today = new Date();
  today.setHours(0, 0, 0, 0);

  // Maak alle lijsten leeg voor de start
  if(upcomingList) upcomingList.innerHTML = '';
  if(ongoingList) ongoingList.innerHTML = '';
  if(pastList) pastList.innerHTML = '';

  // Houden tellers bij om te zien of een lijst leeg blijft
  let upcomingCount = 0;
  let ongoingCount = 0;
  let pastCount = 0;

  // Loop door alle tentoonstellingen
  exhibitions.forEach(exhibition => {
    const startDate = new Date(exhibition.startDate);
    const endDate = new Date(exhibition.endDate);

    if (startDate > today) {
      // 1. UPCOMING -> false (geen oranje vakje)
      if(upcomingList) {
        upcomingList.innerHTML += createExhibitionHTML(exhibition, false);
        upcomingCount++;
      }
    } 
    else if (endDate >= today) {
      // 2. ONGOING -> TRUE (hierdoor verschijnt het oranje vakje!)
      if(ongoingList) {
        ongoingList.innerHTML += createExhibitionHTML(exhibition, true);
        ongoingCount++;
      }
    } 
    else {
      // 3. PAST -> false (geen oranje vakje)
      if(pastList) {
        pastList.innerHTML += createExhibitionHTML(exhibition, false);
        pastCount++;
      }
    }
  });

  // HIER controleren we of een lijst leeg is. Zo ja, plaatsen we de filler-tekst:
  if (upcomingCount === 0 && upcomingList) {
    upcomingList.innerHTML = '<p class="exhibition-filler" style="font-style: italic; opacity: 0.6; padding: 10px 0;">No upcoming exhibitions planned at the moment.</p>';
  }
  
  if (ongoingCount === 0 && ongoingList) {
    ongoingList.innerHTML = '<p class="exhibition-filler" style="font-style: italic; opacity: 0.6; padding: 10px 0;">No ongoing exhibitions at the moment.</p>';
  }

  if (pastCount === 0 && pastList) {
    pastList.innerHTML = '<p class="exhibition-filler" style="font-style: italic; opacity: 0.6; padding: 10px 0;">No past exhibitions found.</p>';
  }
}

// Uitvoeren als de pagina klaar is
window.addEventListener('DOMContentLoaded', renderExhibitions);
</script>
