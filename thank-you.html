<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank you — Laura Theeuwen</title>
  <link rel="icon" type="image/jpeg" href="images/homepage/yourimage.png">

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&family=Work+Sans:wght@300;400;500&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="css/style.css" />

  <style>
    /* Centers the thank-you message on the page */
    .thankyou-wrap {
      min-height: calc(100vh - 130px);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    .thankyou-inner {
      max-width: 480px;
    }

    .thankyou-icon {
      width: 48px;
      height: 48px;
      stroke: var(--color-accent);
      margin: 0 auto var(--space-3);
      display: block;
    }

    .thankyou-heading {
      font-family: var(--font-display);
      font-weight: 300;
      font-size: 3rem;
      line-height: 1;
      margin-bottom: var(--space-2);
    }

    .thankyou-text {
      font-family: var(--font-body);
      font-size: 1.2rem;
      font-style: italic;
      color: var(--color-text-muted);
      line-height: 1.7;
      margin-bottom: var(--space-4);
    }
  </style>
</head>
<body>

  <header class="topbar">
    <a href="index.html" class="brand">
      <span class="brand-name">Laura Theeuwen</span>
      <span class="brand-title">Painter</span>
      <svg class="brand-flourish" viewBox="0 0 160 14" aria-hidden="true">
        <path d="M2 8 C 30 -2, 50 16, 80 7 S 130 -1, 158 8" />
      </svg>
    </a>
    <nav class="nav" aria-label="Main navigation">
      <a href="index.html" class="nav-link">Home</a>
      <a href="portfolio.html" class="nav-link">Portfolio</a>
      <a href="exhibitions.html" class="nav-link">Exhibitions</a>
      <a href="story.html" class="nav-link">Story</a>
      <a href="contact.html" class="nav-link">Contact</a>
      <a href="https://instagram.com/REPLACE_WITH_HANDLE" class="nav-icon" aria-label="Instagram" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="18" height="18" rx="5" />
          <circle cx="12" cy="12" r="4" />
          <circle cx="17.2" cy="6.8" r="1" fill="currentColor" stroke="none" />
        </svg>
      </a>
    </nav>
  </header>

  <div class="thankyou-wrap">
    <div class="thankyou-inner">

      <!-- A simple checkmark drawn in SVG — no image file needed -->
      <svg class="thankyou-icon" viewBox="0 0 24 24" fill="none" stroke-width="1.2" aria-hidden="true">
        <circle cx="12" cy="12" r="10" />
        <polyline points="7 12.5 10.5 16 17 9" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>

      <h1 class="thankyou-heading">Thank you</h1>

      <p class="thankyou-text">
        Your message has been received.<br />
        Laura will be in touch with you soon.
      </p>

      <a href="index.html" class="btn btn-primary">Back to home</a>

    </div>
  </div>

</body>
</html>
